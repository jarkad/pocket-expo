version = '2'

[linters]
default = 'all'
disable = [
  'depguard', # for enterprise scale
  'wsl',      # deprecated
]

[linters.exclusions]
paths = ['(.+)_templ.go']

[[linters.exclusions.rules]]
path = '(.+)_test.go'
linters = [
  'gochecknoglobals', # overzealous
]

[linters.settings.varnamelen]
ignore-decls = [
  'db *sql.DB',
  'r *http.Request',
  'tx *sql.Tx',
  'w http.ResponseWriter',
]

[formatters]
enable = ['gofmt']
