# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  migrate:
    cmd: go tool dbmate -u sqlite:db.sqlite3 up
    sources:
      - "db/migrations/**/*.sql"

  build:
    cmds:
      - go tool sqlc generate
      - go tool templ generate
      - go mod tidy
      - go build .
    sources:
      - "**/*.go"
      - "**/*.templ"
      - "db/migrations/**/*.sql"
      - "db/queries/**/*.sql"
      - exclude: "**/*_templ.go"
      - exclude: "queries/**/*.go"

  run:
    deps:
      - build
      - migrate
    cmd: ./pocket-expo {{.CLI_ARGS}}

  fmt: treefmt {{.CLI_ARGS}}
  vuln: go tool govulncheck {{.CLI_ARGS}} ./...
